name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: agency_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Kodları GitHub'dan Çek
        uses: actions/checkout@v4

      - name: Java JDK 21 Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Backend Testlerini Çalıştır
        run: |
          cd hotel-management
          mvn test

      - name: Docker Buildx Kurulumu
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub'a Giriş Yap
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Spring Boot (Backend) İmajını Derle ve Pushla
        uses: docker/build-push-action@v5
        with:
          context: ./hotel-management
          file: ./hotel-management/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/spring-backend:latest

      - name: Vue 3 (Frontend) İmajını Derle ve Pushla
        uses: docker/build-push-action@v5
        with:
          context: ./hotel-management-front
          file: ./hotel-management-front/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vue-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Sunucuya SSH ile Bağlan ve Docker Compose Çalıştır
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/hotel-management-system
            git pull origin main
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            docker compose pull
            docker compose down
            docker compose up -d
            docker image prune -f