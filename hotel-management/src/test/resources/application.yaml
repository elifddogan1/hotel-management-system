spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/agency_test_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: secret_password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

