version: '3.8'

services:
  # 1. Veritabanı Servisimiz (Spring Boot'a 'db' olarak tanıttığımız yer)
  db:
    image: postgres:15-alpine
    container_name: agency_postgres_db
    environment:
      POSTGRES_DB: agency_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
